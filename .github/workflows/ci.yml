name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            src/test/requirements.txt
            src/disasters/requirements.txt
            src/ctscan/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r src/test/requirements.txt
          pip install -r src/disasters/requirements.txt
          pip install -r src/ctscan/requirements.txt
          pip install pytest

      - name: Validate dependency graph
        run: pip check

      - name: Run tests
        run: pytest -q
